<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Answers Review</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/answers.css" />
  </head>
  <body>
    <nav class="navbar navbar-custom sticky-top">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <span class="navbar-brand mb-0 h1">✅ Answers Review</span>
        <a href="results.html" class="btn btn-sm btn-navbar">Back to Results</a>
      </div>
    </nav>

    <main class="container answers-main py-4">
      <section class="review-summary mb-4" id="reviewSummary">
        <article class="summary-tile">
          <p class="summary-label">Score</p>
          <p class="summary-value" id="scoreValue">0 / 0</p>
        </article>
        <article class="summary-tile">
          <p class="summary-label">Correct</p>
          <p class="summary-value" id="correctValue">0</p>
        </article>
        <article class="summary-tile">
          <p class="summary-label">Wrong / Unanswered</p>
          <p class="summary-value" id="wrongValue">0</p>
        </article>
      </section>

      <section class="answers-list" id="answersList"></section>

      <article class="empty-state d-none" id="emptyState">
        <h5>No answer review data available</h5>
        <p>Complete and submit the quiz first, then open the answers page.</p>
        <a href="quiz.html" class="btn btn-gradient">Go To Quiz</a>
      </article>
    </main>

    <script type="module" src="js/answers-page.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
