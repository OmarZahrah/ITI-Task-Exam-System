<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <nav class="navbar navbar-custom sticky-top">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🎓 Quiz System</span>
      </div>
    </nav>

    <div class="container-fluid py-5 text-center hero-section">
      <div class="container">
        <h2 class="display-5 mb-3">Welcome to Quiz System</h2>
        <p class="lead mb-4" style="color: #adb5bd">
          Test your knowledge with 15 questions
        </p>

        <div
          class="d-flex gap-3 justify-content-center"
          style="max-width: 400px; margin: 0 auto"
        >
          <a href="signup.html" class="flex-grow-1">
            <button
              class="btn btn-gradient btn-signup w-100 py-3"
              style="font-size: 1rem"
            >
              📝 Sign Up
            </button>
          </a>
          <a href="login.html" class="flex-grow-1">
            <button
              class="btn btn-gradient btn-login w-100 py-3"
              style="font-size: 1rem"
            >
              🔐 Log In
            </button>
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
  </body>
</html>
