<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/quiz.css" />
  </head>
  <body>
    <nav class="navbar navbar-custom sticky-top">
      <div
        class="container-fluid d-flex justify-content-between align-items-center"
      >
        <span class="navbar-brand mb-0 h1">📝 Quiz</span>
        <div id="timer" class="timer">30:00</div>
        <button id="logoutBtn" class="btn btn-sm btn-navbar">Logout</button>
      </div>
    </nav>

    <main class="container-fluid quiz-main py-4">
      <div class="row g-4">
        <aside class="col-lg-3 col-md-4">
          <div class="quiz-sidebar h-100">
            <h5 class="mb-3">Questions</h5>
            <div class="progress-container mb-3">
              <div class="progress-bar-wrapper">
                <div id="progressBar" class="progress-bar-fill"></div>
              </div>
              <div class="progress-text" id="progressText">0 / 15</div>
            </div>
            <div id="qlist"></div>
          </div>
        </aside>

        <section class="col-lg-9 col-md-8">
          <div class="question-card">
            <div class="question-head">
              <h5 class="mb-0">
                Question <span id="num">1</span> of <span id="total">15</span>
              </h5>
              <button id="flag" class="flag-btn" title="Flag question">
                ⭐
              </button>
            </div>

            <div class="question-text" id="qtext">Loading...</div>
            <div id="choices"></div>

            <div class="action-buttons">
              <button id="prev" class="btn btn-nav">← Previous</button>
              <button id="next" class="btn btn-nav">Next →</button>
              <button id="submitBtn" class="btn btn-submit">✓ Submit</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="js/quiz-page.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
;
